schema: spec-driven

# Project context (optional)
# This is shown to AI when creating artifacts.
# Add your tech stack, conventions, style guides, domain knowledge, etc.
# Example:
#   context: |
#     Tech stack: TypeScript, React, Node.js
#     We use conventional commits
#     Domain: e-commerce platform
context: |
  Langue par défaut: français.
  Rédiger les artefacts OpenSpec en français.
  Conserver les mots-clés structurels imposés par OpenSpec (Requirement, Scenario, WHEN, THEN, ADDED/MODIFIED/REMOVED/RENAMED).

# Per-artifact rules (optional)
# Add custom rules for specific artifacts.
# Example:
#   rules:
#     proposal:
#       - Keep proposals under 500 words
#       - Always include a "Non-goals" section
#     tasks:
#       - Break tasks into chunks of max 2 hours
rules:
  proposal:
    - Rédiger le contenu en français.
  design:
    - Rédiger le contenu en français.
  specs:
    - Rédiger les descriptions et scénarios en français.
    - Conserver strictement les marqueurs structurels OpenSpec requis.
  tasks:
    - Rédiger les tâches en français.
