<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestionnaire - Consolidation</title>
  <link rel="stylesheet" href="../../assets/base.css">
</head>
<body class="mockup-screen">
  <div class="mockup-container">
    <header class="mockup-header">
      <div class="title-stack"><h1>Consolidation</h1><p class="subtitle">Domaine gestionnaire - synthese transversale commandes, stock et chiffres</p></div>
      <span class="static-pill">Previsualisation statique</span>
    </header>
    <section class="layout-3">
      <div class="kpi"><span class="muted">CA cumule</span><strong>428 000 EUR</strong></div>
      <div class="kpi"><span class="muted">Commandes traitees</span><strong>1 284</strong></div>
      <div class="kpi"><span class="muted">Taux service</span><strong>96%</strong></div>
    </section>
    <section class="card">
      <table>
        <thead><tr><th>Periode</th><th>CA</th><th>Commandes</th><th>Taux service</th></tr></thead>
        <tbody>
          <tr><td>Rentrée 2026</td><td>312 000 EUR</td><td>924</td><td>95%</td></tr>
          <tr><td>Noel 2026</td><td>116 000 EUR</td><td>360</td><td>98%</td></tr>
        </tbody>
      </table>
    </section>
  </div>
</body>
</html>
