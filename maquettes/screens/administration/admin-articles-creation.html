<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestionnaire - Articles creation</title>
  <link rel="stylesheet" href="../../assets/base.css">
</head>
<body class="mockup-screen">
  <div class="mockup-container">
    <header class="mockup-header">
      <div class="title-stack"><h1>Creation d'article</h1><p class="subtitle">Domaine gestionnaire - ecran de creation d'un nouvel article</p></div>
      <span class="static-pill">Previsualisation statique</span>
    </header>
    <section class="card">
      <div class="field"><label>Code de reference</label><input class="input" value="ART-1204"></div>
      <div class="field"><label>Libelle</label><input class="input" value="Classeur 4 anneaux"></div>
      <div class="field"><label>Marque</label><input class="input" value="Exacompta"></div>
      <div class="field"><label>Disponible aux commandes</label><select class="select"><option>Oui</option><option>Non</option></select></div>
      <div class="field"><label>Disponible au stock</label><select class="select"><option>Oui</option><option>Non</option></select></div>
      <p class="muted">Disponibilite commandes: visible en creation de commande. Disponibilite stock: visible dans l'inventaire.</p>
      <div class="actions">
        <button class="button">Annuler</button>
        <button class="button primary">Creer l'article</button>
      </div>
    </section>
  </div>
</body>
</html>
