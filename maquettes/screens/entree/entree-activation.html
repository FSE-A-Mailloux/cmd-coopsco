<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activation de compte</title>
  <link rel="stylesheet" href="../../assets/base.css">
</head>
<body class="mockup-screen">
  <div class="mockup-container">
    <header class="mockup-header">
      <div class="title-stack"><h1>Activation de compte</h1><p class="subtitle">Validation de l'acces initial</p></div>
      <span class="static-pill">Previsualisation statique</span>
    </header>
    <section class="layout-2">
      <article class="card">
        <div class="field"><label>Code d'activation</label><input class="input" value="ABCD-1234"></div>
        <div class="field"><label>Nouveau mot de passe</label><input class="input" type="password" value="********"></div>
        <div class="field"><label>Confirmation</label><input class="input" type="password" value="********"></div>
        <button class="button primary">Activer le compte</button>
      </article>
      <article class="card">
        <h2 class="card-title">Informations utiles</h2>
        <p class="muted">Le code est envoye par email lors de la creation du compte.</p>
      </article>
    </section>
  </div>
</body>
</html>
