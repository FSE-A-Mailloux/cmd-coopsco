<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creation de compte</title>
  <link rel="stylesheet" href="../../assets/base.css">
</head>
<body class="mockup-screen">
  <div class="mockup-container">
    <header class="mockup-header">
      <div class="title-stack"><h1>Creation de compte</h1><p class="subtitle">Parcours d'entree famille - ouverture d'un nouveau compte</p></div>
      <span class="static-pill">Previsualisation statique</span>
    </header>
    <section class="layout-2">
      <article class="card">
        <div class="field"><label>Nom</label><input class="input" value="Martin"></div>
        <div class="field"><label>Prenom</label><input class="input" value="Lea"></div>
        <div class="field"><label>Email</label><input class="input" value="lea.martin@example.fr"></div>
        <div class="field"><label>Telephone</label><input class="input" value="06 12 34 56 78"></div>
        <div class="field"><label>Mot de passe</label><input class="input" type="password" value="********"></div>
        <div class="actions">
          <button class="button">Retour connexion</button>
          <button class="button primary">Creer mon compte</button>
        </div>
      </article>
      <article class="card">
        <h2 class="card-title">Etapes suivantes</h2>
        <p class="muted">Apres creation, un email d'activation est envoye pour finaliser l'acces.</p>
      </article>
    </section>
  </div>
</body>
</html>
