<!DOCTYPE html>
<html ng-app="tonyryuApp">
  <head>
    <link rel="shortcut icon" type="image/x-icon" href="favicon.ico" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>CoopSco A.Mailloux</title>
    <link href="libs/bootstrap/css/bootstrap.css" rel="stylesheet" type="text/css"/>
    <link href="style/app.css" rel="stylesheet" type="text/css"/>
    <link href="style/custom.css" rel="stylesheet" type="text/css"/>
    <link href="libs/font-awesome-4.7.0/css/font-awesome.min.css" rel="stylesheet" type="text/css"/>
    <link href="libs/codemirror/lib/codemirror.css" rel="stylesheet" type="text/css"/>
  </head>
  <body ng-controller="appCtrl">
    <!-- image de chargement -->
    <div ng-show="getDatas().appDatas.dataLoading > 0" class="loading overlay" style="background-image:url('imgs/gif-chargement.gif');"></div>

    <!-- HEADER -->
    <div id="header" class="navbar navbar-default navbar-fixed-top">
      <div class="navbar-header">
        <button class="navbar-toggle collapsed" type="button" data-toggle="collapse" data-target="#login-collapse">
          <i class="icon-reorder"></i>
        </button>
        <img src="imgs/logosite.png" alt="" ng-click="clickLogo()" id="logoapp"/>
      </div>
      <nav class="collapse navbar-collapse" id="login-collapse">
        <ul class="nav navbar-nav pull-right margin-all5">
          <li>
            <ng-include src="'app/login/login.html'"></ng-include>
          </li>
        </ul>
      </nav>
    </div>
    
    <!-- PAGE -->
    <div id="wrapper">
      <!-- MENU -->
      <div id="sidebar-wrapper" class="col-md-2">
        <div id="sidebar">
          <ng-include src="'app/menu/menu.html'"></ng-include>
        </div>
      </div>
      
      <!-- CONTENEUR -->
      <div id="main-wrapper" class="col-md-10">
        <div id="main">
          <!-- message d'erreur -->
          <div ng-show="getDatas().appDatas.erreur !== ''" class="alert alert-danger topbot-buffer5">{{getDatas().appDatas.erreur}}</div>
          <!-- composant -->
          <my-include src="getUrlComponent()">Failure message</my-include>
        </div>
      </div>
    </div>
    
    
    <!--  Script lib -->
    <script src="libs/jquery/js/jquery-3.2.1.min.js" type="text/javascript"></script>
    <script src="libs/angularjs/js/angular.min.js" type="text/javascript"></script>
    <script src="libs/angularjs/js/angular-route.min.js" type="text/javascript"></script>
    <script src="libs/angularjs/js/angular-locale_fr-fr.js" type="text/javascript"></script>
    <script src="libs/bootstrap/js/bootstrap.min.js" type="text/javascript"></script>
    <script src="libs/bootstrap/js/ui-bootstrap-tpls-2.5.0.min.js" type="text/javascript"></script>
    <script src="libs/ocLazyLoad/js/ocLazyLoad.min.js" type="text/javascript"></script>
    <script src="libs/recaptcha/js/angular-recaptcha.min.js" type="text/javascript"></script>
    <script src="libs/base64-binary/js/base64-binary.js" type="text/javascript"></script>
    <script src="libs/smart-table/js/smart-table.min.js" type="text/javascript"></script>
    <script src="libs/codemirror/lib/codemirror.js" type="text/javascript"></script>
    <script src="libs/codemirror/mode/sql/sql.js" type="text/javascript"></script>
    <script src="libs/codemirror/mode/mysql/mysql.js" type="text/javascript"></script>
    <script src="libs/codemirror/mode/xml/xml.js" type="text/javascript"></script>
    <script src="libs/codemirror/mode/javascript/javascript.js" type="text/javascript"></script>
    <script src="libs/codemirror/ui/ui-codemirror.js" type="text/javascript"></script>
    <script src="libs/chartjs/js/Chart.min.js" type="text/javascript"></script>
    <script src="libs/angular-chartjs/js/angular-chart.min.js" type="text/javascript"></script>
    <script src="libs/ckeditor/ckeditor.js" type="text/javascript"></script>
    
    <script src="app/services.js" type="text/javascript"></script>
    <script src="app/app.js" type="text/javascript"></script>
    
    <script src="app/login/login.js" type="text/javascript"></script>
    <script src="app/menu/menu.js" type="text/javascript"></script>
  </body>
</html>
