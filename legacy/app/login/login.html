<div name="formLogin" ng-controller="loginCtrl">
  <div ng-show="getDatas().appDatas.token === ''">
    <form ng-show="getDatas().params.loginActivate" class="form-inline" ng-submit='authentifier()'>
      <div class="form-group">
        <input type="text" name='login' class="form-control input-sm" placeholder="Login" ng-model="compte.login" autocomplete="off" required>
      </div>
      <div class="form-group">
        <input type="password" class="form-control input-sm" placeholder="Mot de passe" ng-model="compte.mdp" autocomplete="off" required>
      </div>
      <div class="form-group">
        <button type="submit" class="btn btn-primary btn-sm btn-block " ng-disabled="formLogin.$invalid || getDatas().appDatas.dataLoading">S'authentifier</button>
      </div>
    </form>
    <button ng-show="getDatas().params.createAccountActivate" type="button" class="btn btn-link btn-sm color-link" ng-click='creerCompte()'>Créer compte</button> 
    <button ng-show="getDatas().params.resendPassword" type="button" class="btn btn-link btn-sm color-link" ng-click='recupMdp()'>Mot de passe oublié ?</button> 
  </div>
  <div ng-hide="getDatas().appDatas.token === ''">
    <div class="btn-group" role="group" aria-label="...">
      <button type="button" class="btn btn-default" ng-click="modifierCompte()">{{getDatas().appDatas.compte_uti}}</button>
      <select ng-hide="getDatas().appDatas.tabGroupe.length === 1" ng-model="getDatas().appDatas.componentDefault" name="type" class="btn btn-default" ng-change="changerGroupe()">
        <option ng-repeat="groupe in getDatas().appDatas.tabGroupe" value="{{groupe.cd_com}}">{{groupe.nom_gro}}</option>
      </select>
      <button type="button" class="btn btn-default" ng-click="deconnecter()"><span class="glyphicon glyphicon-off"></span></button>
    </div>
  </div>
</div>
