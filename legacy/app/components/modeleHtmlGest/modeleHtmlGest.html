<div class="panel panel-primary" ng-controller="modeleHtmlGestCtrl">
  <div class="panel-heading">Modèle Html</div>
  <div class="panel-body">
    <form name="formulaire" class="form-horizontal" rc-submit='valider()' role="form" novalidate>
      <div class="form-group" ng-class="{'has-error': rc.formulaire.needsAttention(formulaire.code)}">
        <label for="code" class="col-sm-2 control-label">Code</label>
        <div class="col-sm-3">
          <input type="text" class="form-control" name="code" placeholder="Code du modèle" required  ng-minlength="6" ng-maxlength="64" ng-model="modeleHtml.code_mhl" autofocus ng-disabled="contexte === 'mod'">
          <div class="alert alert-danger" ng-show="formulaire.$submitted && formulaire.code.$invalid">code entre 6 et 64 caractères</div>
        </div>
      </div>
      <div class="form-group" ng-class="{'has-error': rc.formulaire.needsAttention(formulaire.lib)}">
        <label for="lib" class="col-sm-2 control-label">Libellé</label>
        <div class="col-sm-3">
          <input type="text" class="form-control" name="lib" placeholder="Libellé du modèle HTML"  ng-maxlength="128" ng-model="modeleHtml.lib_mhl" >
          <div class="alert alert-danger" ng-show="formulaire.$submitted && formulaire.lib.$invalid">libellé de moins de 128 caractères</div>
        </div>
      </div>
      <div class="form-group" ng-class="{'has-error': rc.formulaire.needsAttention(formulaire.type)}">
        <label for="type" class="col-sm-2 control-label">Type</label>
        <div class="col-sm-3">
          <select class="form-control" name="type" required ng-model="modeleHtml.type_mhl" ng-init="modeleHtml.type_mhl = 'MAIL'">
            <option value="MAIL">MAIL</option>
            <option value="PDF">PDF</option>
          </select>
          <div class="alert alert-danger" ng-show="formulaire.$submitted && formulaire.type.$invalid">obligatoire</div>
        </div>
      </div>
      <div class="form-group" ng-class="{'has-error': rc.formulaire.needsAttention(formulaire.verrou)}">
        <label for="verrou" class="col-sm-2 control-label">Verrouillé</label>
        <div class="col-sm-3">
          <input type="checkbox" class="form-control move-left" name="verrou" placeholder="Modèle verrouillé" ng-model="modeleHtml.verrou_mhl">
          <!--div class="alert alert-danger" ng-show="formulaire.$submitted && formulaire.verrou.$invalid">obligatoire</div-->
        </div>
      </div>
      <div class="form-group" ng-class="{'has-error': rc.formulaire.needsAttention(formulaire.modele)}">
        <label for="modele" class="col-sm-2 control-label">Modèle HTML</label>
        <div class="col-sm-3">
          <textarea ui-codemirror ui-codemirror-opts="editorOptions" class="form-control" rows="8" name="modele" placeholder="Modèle Html" required ng-model="modeleHtml.modele_mhl"></textarea>
          <div class="alert alert-danger" ng-show="formulaire.$submitted && formulaire.modele.$invalid">Obligatoire</div>
        </div>
      </div>
      <div class="form-group" >
        <label for="json" class="col-sm-2 control-label">JSON de test</label>
        <div class="col-sm-3">
          <textarea ui-codemirror ui-codemirror-opts="editorOptionsJSON" class="form-control" rows="8" name="json" placeholder="Json Test" ng-model="jsonText"></textarea>
        </div>
      </div>

      <div class="form-group" >
        <button type="submit" class="btn btn-primary col-sm-offset-2">Valider</button>
      </div>
    </form>
  </div>
</div>
