<div class="panel panel-primary" ng-controller="compGestCtrl">
  <div class="panel-heading">Composant</div>
  <div class="panel-body">
    <form name="formulaire" class="form-horizontal" rc-submit='valider()' role="form" novalidate>
      <div class="form-group" ng-class="{'has-error': rc.formulaire.needsAttention(formulaire.code)}">
        <label for="code" class="col-sm-2 control-label">Code</label>
        <div class="col-sm-3">
          <input type="text" class="form-control" name="code" placeholder="Code composant" required  ng-minlength="6" ng-maxlength="64" ng-model="comp.cd_com" autofocus>
          <div class="alert alert-danger" ng-show="formulaire.$submitted && formulaire.code.$invalid">code entre 6 et 64 caractères</div>
        </div>
      </div>
      <div class="form-group" ng-class="{'has-error': rc.formulaire.needsAttention(formulaire.lib)}">
        <label for="lib" class="col-sm-2 control-label">Libellé</label>
        <div class="col-sm-3">
          <input type="text" class="form-control" name="lib" placeholder="Libellé du composant" ng-maxlength="256" ng-model="comp.lib_com" >
          <div class="alert alert-danger" ng-show="formulaire.$submitted && formulaire.lib.$invalid">libellé de moins de 256 caractères</div>
        </div>
      </div>
      <div class="form-group" ng-class="{'has-error': rc.formulaire.needsAttention(formulaire.verrou)}">
        <label for="verrou" class="col-sm-2 control-label">Verrouillé</label>
        <div class="col-sm-3">
          <input type="checkbox" class="form-control move-left" name="verrou" placeholder="Composant verrouillé" ng-model="comp.verrou_com">
          <!--div class="alert alert-danger" ng-show="formulaire.$submitted && formulaire.verrou.$invalid">obligatoire</div-->
        </div>
      </div>
      <div class="form-group" >
        <button type="submit" class="btn btn-primary col-sm-offset-2">Valider</button>
      </div>
    </form>
  </div>
</div>
