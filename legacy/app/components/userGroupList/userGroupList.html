<div class="panel panel-primary" ng-controller="userGroupListCtrl">
  <div class="panel-heading">Liste des groupes de l'utilisateur {{libUti}}</div>
  <div class="panel-body">
    <table st-table="displayedCollection" st-safe-src="rowCollection" class="table table-striped">
      <thead>
        <tr>
          <th ng-repeat="title in rowTitle" st-sort="{{title.name}}">{{title.lib}}</th>
        </tr>
        <tr>
          <th colspan="{{rowTitle.length}}">
            <button class="btn btn-primary glyphicon glyphicon-refresh form-inline btn-refresh-st" ng-click="refreshList()"></button>
            <input st-search="" class="form-control form-inline input-st-search" placeholder="recherche globale..." type="text"/>
          </th>
        </tr>
      </thead>
      <tbody>
        <tr st-select-row="row" st-select-mode="multiple" ng-repeat="row in displayedCollection">
          <td ng-repeat="title in rowTitle" ng-style="{color:((row.id_uti||0) > 0 ? '#33bb33' : '#ff2222')}">
            <div ng-if="title.type == 'text'">{{row[title.name]}}</div>
            <div ng-if="title.type == 'icon'" ng-class="row[title.name]"></div>
          </td>
        </tr>
      </tbody>
      <!--tfoot>
        <tr>
          <td colspan="5" class="text-center">
            <div st-pagination="" st-items-by-page="16" st-displayed-pages="7"></div>
          </td>
        </tr>
      </tfoot-->
    </table>
  </div>
</div>
