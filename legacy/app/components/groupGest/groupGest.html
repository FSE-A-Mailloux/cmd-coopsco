<div class="panel panel-primary" ng-controller="groupGestCtrl">
  <div class="panel-heading">Groupe</div>
  <div class="panel-body">
    <form name="formulaire" class="form-horizontal" rc-submit='valider()' role="form" novalidate>
      <div class="form-group" ng-class="{'has-error': rc.formulaire.needsAttention(formulaire.code)}">
        <label for="code" class="col-sm-2 control-label">Code</label>
        <div class="col-sm-3">
          <input type="text" class="form-control" name="code" placeholder="Code groupe" required  ng-minlength="2" ng-maxlength="10" ng-model="group.cd_gro" autofocus ng-disabled="contexte === 'mod'">
          <div class="alert alert-danger" ng-show="formulaire.$submitted && formulaire.code.$invalid">code entre 2 et 10 caractères</div>
        </div>
      </div>
      <div class="form-group" ng-class="{'has-error': rc.formulaire.needsAttention(formulaire.nom)}">
        <label for="nom" class="col-sm-2 control-label">Nom</label>
        <div class="col-sm-3">
          <input type="text" class="form-control" name="nom" placeholder="Nom du groupe" ng-maxlength="128" ng-model="group.nom_gro" >
          <div class="alert alert-danger" ng-show="formulaire.$submitted && formulaire.nom.$invalid">libellé de moins de 128 caractères</div>
        </div>
      </div>
      <div class="form-group" ng-class="{'has-error': rc.formulaire.needsAttention(formulaire.cdComDefaut)}">
        <label for="cdComDefaut" class="col-sm-2 control-label">Nom</label>
        <div class="col-sm-3">
          <searshfield sf-com='compList' sf-code="cd_com" name="cdComDefaut" ng-model="group.cd_com" ng-maxlength="128" required ng-value="group.cd_com" sf-value="cd_com"></searshfield>
          <div class="alert alert-danger" ng-show="formulaire.$submitted && formulaire.cdComDefaut.$invalid">Composant par défaut obligatoire</div>
        </div>
      </div>
      <div class="form-group" ng-class="{'has-error': rc.formulaire.needsAttention(formulaire.niveau)}">
        <label for="niveau" class="col-sm-2 control-label">Niveau</label>
        <div class="col-sm-3">
          <input type="number" class="form-control" name="niveau" placeholder="99" required ng-model="group.niveau_gro">
          <div class="alert alert-danger" ng-show="formulaire.$submitted && formulaire.niveau.$invalid">obligatoire</div>
        </div>
      </div>
      <div class="form-group" >
        <button type="submit" class="btn btn-primary col-sm-offset-2">Valider</button>
      </div>
    </form>
  </div>
</div>
