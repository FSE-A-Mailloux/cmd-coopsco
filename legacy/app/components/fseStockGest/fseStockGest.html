<div class="panel panel-primary" ng-controller="fseStockGestCtrl">
  <div class="panel-heading">Stock</div>
  <div class="panel-body">
    <span>{{fse_stock.code_art}} : {{fse_stock.lib_art}}</span>
    <form name="formulaire" class="form-horizontal" rc-submit='valider()' role="form" novalidate>
      <div class="form-group" ng-class="{'has-error': rc.formulaire.needsAttention(formulaire.nbrsto)}">
        <label for="nbrsto" class="col-sm-2 control-label">Quantité</label>
        <div class="col-sm-3">
          <input type="number" class="form-control" min="0" step="1" name="nbrsto" placeholder="0" required ng-model="fse_stock.nb_sto">
          <div class="alert alert-danger" ng-show="formulaire.$submitted && formulaire.nbrsto.$invalid">obligatoire</div>
        </div>
      </div>
      <div class="form-group" >
        <button type="submit" class="btn btn-primary col-sm-offset-2">Valider</button>
      </div>
    </form>
  </div>
</div>
