<div class="panel panel-primary" ng-controller="requestGestCtrl">
  <div class="panel-heading">Requête</div>
  <div class="panel-body">
    <form name="formulaire" class="form-horizontal" rc-submit='valider()' role="form" novalidate>
      <div class="form-group" ng-class="{'has-error': rc.formulaire.needsAttention(formulaire.code)}">
        <label for="code" class="col-sm-2 control-label">Code</label>
        <div class="col-sm-3">
          <input type="text" class="form-control" name="code" placeholder="Code de la requête" required  ng-minlength="6" ng-maxlength="64" ng-model="request.code_req" autofocus>
          <div class="alert alert-danger" ng-show="formulaire.$submitted && formulaire.code.$invalid">code entre 6 et 64 caractères</div>
        </div>
      </div>
      <div class="form-group" ng-class="{'has-error': rc.formulaire.needsAttention(formulaire.lib)}">
        <label for="lib" class="col-sm-2 control-label">Libellé</label>
        <div class="col-sm-3">
          <input type="text" class="form-control" name="lib" placeholder="Libellé de la requête"  ng-maxlength="128" ng-model="request.lib_req" >
          <div class="alert alert-danger" ng-show="formulaire.$submitted && formulaire.lib.$invalid">libellé de moins de 128 caractères</div>
        </div>
      </div>
      <div class="form-group" ng-class="{'has-error': rc.formulaire.needsAttention(formulaire.result)}">
        <label for="result" class="col-sm-2 control-label">Nom résultat</label>
        <div class="col-sm-3">
          <input type="text" class="form-control" name="result" placeholder="Code résultat" required  ng-minlength="6" ng-maxlength="64" ng-model="request.result_req">
          <div class="alert alert-danger" ng-show="formulaire.$submitted && formulaire.result.$invalid">code entre 6 et 64 caractères</div>
        </div>
      </div>
      <div class="form-group" ng-class="{'has-error': rc.formulaire.needsAttention(formulaire.requete)}">
        <label for="requete" class="col-sm-2 control-label">Requête SQL</label>
        <div class="col-sm-3">
          <textarea ui-codemirror ui-codemirror-opts="editorOptions" class="form-control" rows="8" name="requete" placeholder="Requête de sélection" required ng-model="request.select_req"></textarea>
          <div class="alert alert-danger" ng-show="formulaire.$submitted && formulaire.requete.$invalid">Obligatoire</div>
        </div>
      </div>

      <div class="form-group" >
        <button type="submit" class="btn btn-primary col-sm-offset-2">Valider</button>
      </div>
    </form>
  </div>
</div>
