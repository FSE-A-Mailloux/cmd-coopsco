<div class="panel panel-primary" ng-controller="fseAnneeGestCtrl">
  <div class="panel-heading">Période</div>
  <div class="panel-body">
    <form name="formulaire" class="form-horizontal" rc-submit='valider()' role="form" novalidate>
      <div class="form-group" ng-class="{'has-error': rc.formulaire.needsAttention(formulaire.lib)}">
        <label for="lib" class="col-sm-2 control-label">Nom</label>
        <div class="col-sm-3">
          <input type="text" class="form-control" name="lib" placeholder="Libellé de l'année" required ng-minlength="4" ng-maxlength="64" ng-model="fse_annee.lib_ann" autofocus>
          <div class="alert alert-danger" ng-show="formulaire.$submitted && formulaire.lib.$invalid">code entre 4 et 64 caractères</div>
        </div>
      </div>
      <div class="form-group" ng-class="{'has-error': rc.formulaire.needsAttention(formulaire.prefix)}">
        <label for="prefix" class="col-sm-2 control-label">Préfixe N° cmd.</label>
        <div class="col-sm-3">
          <input type="text" class="form-control" name="prefix" placeholder="Préfixe N° commande" required ng-maxlength="10" ng-model="fse_annee.prefix_ann" autofocus>
          <div class="alert alert-danger" ng-show="formulaire.$submitted && formulaire.prefix.$invalid">10 caractères maximum</div>
        </div>
      </div>
      <div class="form-group" ng-class="{'has-error': rc.formulaire.needsAttention(formulaire.dtbutoir)}">
        <label for="dtbutoir" class="col-sm-2 control-label">Date butoir</label>
        <div class="col-sm-3">
          <div class="input-group">
            <input name="dtbutoir" type="text" class="form-control" uib-datepicker-popup="{{dtformat}}" ng-model="dtvalue" is-open="dtopened" datepicker-options="dateOptions" required close-text="Fermer" current-text="Instant" clear-text="Init."/>
            <span class="input-group-btn">
              <button type="button" class="btn btn-default" ng-click="dtopen($event)"><i class="glyphicon glyphicon-calendar"></i></button>
            </span>
          </div>
          <div class="alert alert-danger" ng-show="formulaire.$submitted && formulaire.dtbutoir.$invalid">code entre 4 et 128 caractères</div>
        </div>
      </div>
      <div class="form-group" ng-class="{'has-error': rc.formulaire.needsAttention(formulaire.verrou)}">
        <label for="verrou" class="col-sm-2 control-label">Verrouillée</label>
        <div class="col-sm-3">
          <input type="checkbox" class="form-control move-left" name="verrou" placeholder="Période verrouillée" ng-model="fse_annee.verrou_ann" ng-true-value="'1'">
          <!--div class="alert alert-danger" ng-show="formulaire.$submitted && formulaire.verrou.$invalid">obligatoire</div-->
        </div>
      </div>
      <div class="form-group" >
        <button type="submit" class="btn btn-primary col-sm-offset-2">Valider</button>
      </div>
    </form>
  </div>
</div>
