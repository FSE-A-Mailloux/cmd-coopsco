<div class="panel panel-primary" ng-controller="impressionListeParamGestCtrl">
  <div class="panel-heading">Paramétrage d'une impression de liste</div>
  <div class="panel-body">
    <form name="formulaire" class="form-horizontal" rc-submit='valider()' role="form" novalidate>
      <div class="form-group" ng-class="{'has-error': rc.formulaire.needsAttention(formulaire.libImprListe)}">
        <label for="libImprListe" class="col-sm-2 control-label">Libellé</label>
        <div class="col-sm-3">
          <input type="text" class="form-control" name="libImprListe" placeholder="Nom impression liste" required ng-maxlength="128" ng-model="impression_liste_param.lib_ilp">
          <div class="alert alert-danger" ng-show="formulaire.$submitted && formulaire.libImprListe.$invalid">Libellé de moins de 128 caractères</div>
        </div>
      </div>
      <div class="form-group">
        <label for="actif" class="col-sm-2 control-label">Actif</label>
        <div class="col-sm-3">
          <input type="checkbox" class="form-control move-left" name="actif" ng-model="impression_liste_param.actif_ilp" ng-true-value="1" ng-false-value="0">
        </div>
      </div>
      <div class="form-group" ng-class="{'has-error': rc.formulaire.needsAttention(formulaire.requete)}">
        <label for="requete" class="col-sm-2 control-label">Requête</label>
        <div class="col-sm-3">
          <searshfield sf-com='requestList' sf-code="id_req" name="requete" ng-model="impression_liste_param.id_req" required ng-value="impression_liste_param.lib_req" sf-value="lib_req"></searshfield>
          <div class="alert alert-danger" ng-show="formulaire.$submitted && formulaire.requete.$error.required">Obligatoire</div>
        </div>
      </div>
      <div ng-if="impression_liste_param.tab_champs.length > 0" class="form-group">
        <label for="tabchamps" class="col-sm-2 control-label">Champs</label>
        <div class="col-sm-4">
          <table class="table table-striped" style="width: auto;">
            <thead>
              <th>Colonne</th>
              <th>Type</th>
              <th>Libellé utilisateur</th>
            </thead>
            <tbody>
              <tr ng-repeat="rowChamp in impression_liste_param.tab_champs track by $index">
                <td style='padding-top: 0px; padding-bottom: 0px;'><p class="form-control-static">{{rowChamp.colonne_ilc}}</p></td>
                <td style='padding-top: 0px; padding-bottom: 0px;'><p class="form-control-static">{{rowChamp.type_ilc}}</p></td>
                <td>
                  <input type="text" class="form-control col-sm-1" name="colonnelib" ng-model="rowChamp.libelle_ilc" ng-maxlength="64"/>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
      
      
      <div class="form-group" >
        <button type="submit" class="btn btn-primary col-sm-offset-2">Valider</button>
      </div>
    </form>
  </div>
</div>
