<div class="sidebar-nav" ng-controller="menuCtrl">
  <div class="navbar navbar-default" role="navigation">
    <div class="navbar-header">
      <button type="button" class="navbar-toggle" data-toggle="collapse" data-target="#menu-collapse">
        <span class="sr-only">Toggle navigation</span>
        <span class="icon-bar"></span>
        <span class="icon-bar"></span>
        <span class="icon-bar"></span>
      </button>
      <span class="visible-xs navbar-brand">Menu</span>
    </div>
    <div class="navbar-collapse collapse sidebar-navbar-collapse" id="menu-collapse">
      <ul class="nav navbar-nav">
        <li ng-repeat="optMenu in getMenu() track by $index" class="opt-menu {{isArray(optMenu[3]) ? 'dropdown' : ''}} {{optMenu[2] == 'SEP' ? 'nav-divider' : ''}}">
          <a ng-hide="isArray(optMenu[3]) || optMenu[2] == 'SEP'" href="#" ng-click='clickMenu(optMenu[2], optMenu[3])'><b>{{optMenu[0]}}</b><span style="font-size:16px;" class="pull-right showopacity {{optMenu[1]}}"></span></a>
          <a ng-show="isArray(optMenu[3]) && optMenu[2] != 'SEP'" href="#" class="dropdown-toggle" data-toggle="dropdown"><b>{{optMenu[0]}} </b><b class="caret"></b><span style="font-size:16px;" class="pull-right showopacity {{optMenu[1]}}"></span></a>
          <ul ng-show="isArray(optMenu[3]) && optMenu[2] != 'SEP'" class="dropdown-menu">
            <li ng-repeat="optSousMenu in optMenu[3] track by $index" class="opt-menu">
              <a href="#" ng-click='clickMenu(optMenu[2], optSousMenu[3])'>{{optSousMenu[0]}}<span style="font-size:16px;" class="pull-right showopacity {{optSousMenu[1]}}"></span></a>
            </li>
          </ul>
        </li>
      </ul>
    </div>
  </div>
</div>
