<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
  <head>
    <meta http-equiv="content-type" content="text/html; charset=utf-8"/>
    <meta name="viewport" content="width=device-width; initial-scale=1.0; maximum-scale=1.0;"/>
    <link href='https://fonts.googleapis.com/css?family=Questrial' rel='stylesheet' type='text/css'/>
  </head>
  <body leftmargin="0" topmargin="0" marginwidth="0" marginheight="0">
    <table bgcolor="#565656" width="100%" border="0" cellpadding="0" cellspacing="0">
      <tbody>
        <tr>
          <td>
            <table align="center" width="500px" border="0" cellpadding="0" cellspacing="0">
              <tbody>
                <tr>
                  <td height="30px" style="font-size: 30px; line-height: 30px">&nbsp;</td>
                </tr>
                <tr align="left">
                  <td>
                    <a href="{urlsite}">
                      <img src="{urlsite}/imgs/logosite.png" width="200" border="0">
                    </a>
                  </td>
                </tr>
                <tr>
                  <td height="30px" style="font-size: 30px; line-height: 30px">&nbsp;</td>
                </tr>
                <tr>
                  <td align="center" height="30px" style="font-family: helvetica, sans-serif; text-align: center; font-size: 40px; line-height: 40px; color: #FFFFFF; mso-line-height-rule: exactly;">{titre}</td>
                </tr>
                <tr>
                  <td height="50px" style="font-size: 50px; line-height: 50px">&nbsp;</td>
                </tr>
                <tr>
                  <td>{message}</td>
                </tr>
                <tr>
                  <td height="30px" style="font-size: 30px; line-height: 30px">&nbsp;</td>
                </tr>
              </tbody>
            </table>
          </td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
